name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Cargo build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked
